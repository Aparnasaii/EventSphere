spring.application.name=feedback-service
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/eventmanagementdb
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=8086



# JPA/Hibernate (Optional but recommended)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.healthcheck.enabled=true
eureka.instance.prefer-ip-address=true

# Actuator (REQUIRED for Eureka)
#management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.enabled=true
management.endpoint.health.show-details=always


# Feign & Logging (Optional - helps with debugging)
# Logs the requests being sent to Ticket and Notification services
logging.level.com.event.feedback.client=DEBUG