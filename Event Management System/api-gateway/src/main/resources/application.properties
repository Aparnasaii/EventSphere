# ===============================
# Application
# ===============================
spring.application.name=api-gateway
server.port=8081

# ===============================
# Spring Cloud Gateway Routes
# ===============================
# Event Service (Existing)

# User Service
spring.cloud.gateway.routes[3].id=user-service
spring.cloud.gateway.routes[3].uri=lb://user-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/users/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[0].id=event-service
spring.cloud.gateway.routes[0].uri=lb://event-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/events/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Ticket Service
spring.cloud.gateway.routes[1].id=ticket-service
spring.cloud.gateway.routes[1].uri=lb://ticket-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/tickets/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Notification Service
spring.cloud.gateway.routes[2].id=notification-service
spring.cloud.gateway.routes[2].uri=lb://notification-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/notifications/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# Feedback Service
spring.cloud.gateway.routes[4].id=feedback-service
spring.cloud.gateway.routes[4].uri=lb://feedback-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/feedbacks/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

# ===============================
# Eureka Client Configuration
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.healthcheck.enabled=true

# ===============================
# Eureka Instance Settings
# ===============================
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ===============================
# Actuator (REQUIRED for Eureka)
# ===============================
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.enabled=true
management.endpoint.health.show-details=always

# ===============================
# JWT Configuration (same secret as user-service)
# ===============================
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-min-32-chars-please-please}

# ===============================
# Public routes that bypass JWT check (comma-separated)
# ===============================
gateway.public-paths=/users/api/auth/login,/users/api/auth/register,/users/api/users/register,/users/api/auth/forgot-password,/users/api/auth/reset-password,/actuator

# ===============================
# CORS Configuration (Allow Angular frontend)
# ===============================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers=Authorization,X-User-Id,X-User-Email,X-User-Role