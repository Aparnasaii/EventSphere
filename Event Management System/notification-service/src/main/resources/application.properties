spring.application.name=notification-service
# Loads application-local.properties from classpath if it exists (gitignored, holds secrets).
spring.config.import=optional:classpath:application-local.properties
spring.datasource.url=jdbc:mysql://localhost:3306/eventmanagementdb
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
server.port=8085


spring.mail.host=smtp.sendgrid.net
spring.mail.port =587
spring.mail.username=apikey
# SendGrid API key — set via MAIL_PASSWORD env variable
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

api.mail.from=${MAIL_FROM:no-reply@eventsphere.local}

logging.level.com.event.notificationservice=DEBUG

# ── Eureka registration ─────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.healthcheck.enabled=true
eureka.instance.prefer-ip-address=true

# ── Actuator / Health ───────────────────────────────────
# The mail health indicator tries an SMTP connection on every check.
# If smtp.sendgrid.net is unreachable (firewall / network) the whole
# /actuator/health returns DOWN → Eureka marks the service as DOWN.
# Disable it so only DB + disk health matter.
management.health.mail.enabled=false
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

