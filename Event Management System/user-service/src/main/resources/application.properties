# =========================================================
# 1. MICROSERVICE IDENTITY & SERVER CONFIG
# =========================================================
spring.application.name=user-service
server.port=8082
# Loads application-local.properties from classpath if it exists (gitignored, holds secrets).
spring.config.import=optional:classpath:application-local.properties

# =========================================================
# 2. DATABASE & JPA CONFIGURATION (MySQL)
# =========================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/eventmanagementdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================================================
# 3. LOGGING CONFIGURATION
# =========================================================
# Set global level to INFO, but our project logic to DEBUG
logging.level.root=INFO
logging.level.com.event.userservice=DEBUG

# Trace SQL parameter values (The '?' in queries)
logging.level.org.hibernate.orm.results.basic.BasicValueConverter=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Custom Console Format: Date [Thread] Level Logger - Message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =========================================================
# 4. SECURITY (JWT) CONFIGURATION
# =========================================================
# JWT signing secret — MUST be set via JWT_SECRET env variable in production
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-min-32-chars-please-please}
jwt.expiration=3600000

# =========================================================
# 5. EUREKA DISCOVERY CLIENT CONFIG
# =========================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# =========================================================
# 6. EMAIL SERVICE (Gmail SMTP - SSL port 465)
# =========================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:}
# Gmail App Password — set via MAIL_PASSWORD env variable
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# =========================================================
# 7. ACTUATOR & MONITORING (Health Checks)
# =========================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false
eureka.client.healthcheck.enabled=true
eureka.instance.prefer-ip-address=true
management.info.env.enabled=true
info.app.name=User Service
info.app.description=Microservice for User Management
info.app.version=1.0.0