<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>

    <!-- Sphere gradient -->
    <radialGradient id="sphereGrad" cx="38%" cy="35%" r="62%">
      <stop offset="0%"   stop-color="#a5b4fc"/>
      <stop offset="40%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>

    <!-- Outer glow ring -->
    <radialGradient id="glowRing" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="#4338ca" stop-opacity="0"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.35"/>
    </radialGradient>

    <!-- Shine highlight -->
    <radialGradient id="shine" cx="35%" cy="28%" r="40%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e0e7ff"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>

    <!-- Accent text gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e1b4b" flood-opacity="0.5"/>
    </filter>

    <!-- Soft glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ── Background pill (optional dark bg) ── -->
  <rect x="0" y="0" width="320" height="100" rx="16" fill="#0f0e2a" opacity="0"/>

  <!-- ══════════════════════════════════════
       SPHERE ICON  (centred at 48, 50)
  ══════════════════════════════════════ -->

  <!-- Outer glow halo -->
  <circle cx="48" cy="50" r="44" fill="url(#glowRing)"/>

  <!-- Main sphere body -->
  <circle cx="48" cy="50" r="36" fill="url(#sphereGrad)" filter="url(#shadow)"/>

  <!-- Equator ellipse (horizontal orbit line) -->
  <ellipse cx="48" cy="50" rx="36" ry="10"
           fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.55"/>

  <!-- Vertical great circle (meridian) -->
  <ellipse cx="48" cy="50" rx="12" ry="36"
           fill="none" stroke="#a5b4fc" stroke-width="1" opacity="0.4"/>

  <!-- Diagonal orbit arc (top-left to bottom-right) -->
  <path d="M 18 26 Q 48 38 78 74"
        fill="none" stroke="#c7d2fe" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>

  <!-- Star / event dots on sphere -->
  <circle cx="48" cy="26" r="2.2" fill="#e0e7ff" opacity="0.9"/>
  <circle cx="66" cy="40" r="1.8" fill="#a5b4fc" opacity="0.85"/>
  <circle cx="32" cy="44" r="1.5" fill="#c7d2fe" opacity="0.75"/>
  <circle cx="58" cy="62" r="2"   fill="#818cf8" opacity="0.9"/>
  <circle cx="36" cy="66" r="1.5" fill="#a5b4fc" opacity="0.7"/>

  <!-- Connection lines between dots -->
  <line x1="48" y1="26" x2="66" y2="40" stroke="#c7d2fe" stroke-width="0.6" opacity="0.4"/>
  <line x1="66" y1="40" x2="58" y2="62" stroke="#c7d2fe" stroke-width="0.6" opacity="0.4"/>
  <line x1="48" y1="26" x2="32" y2="44" stroke="#c7d2fe" stroke-width="0.6" opacity="0.35"/>
  <line x1="32" y1="44" x2="36" y2="66" stroke="#c7d2fe" stroke-width="0.6" opacity="0.35"/>
  <line x1="36" y1="66" x2="58" y2="62" stroke="#c7d2fe" stroke-width="0.6" opacity="0.3"/>

  <!-- Shine highlight -->
  <circle cx="48" cy="50" r="36" fill="url(#shine)"/>

  <!-- Thin rim highlight -->
  <circle cx="48" cy="50" r="36"
          fill="none" stroke="#c7d2fe" stroke-width="0.8" opacity="0.35"/>

  <!-- ══════════════════════════════════════
       TEXT
  ══════════════════════════════════════ -->

  <!-- EVENT -->
  <text x="100" y="47"
        font-family="'Cinzel', 'Trajan Pro', Georgia, serif"
        font-size="26"
        font-weight="700"
        letter-spacing="5"
        fill="url(#textGrad)"
        filter="url(#glow)">EVENT</text>

  <!-- SPHERE -->
  <text x="100" y="70"
        font-family="'Cinzel', 'Trajan Pro', Georgia, serif"
        font-size="26"
        font-weight="400"
        letter-spacing="3"
        fill="url(#accentGrad)">SPHERE</text>

  <!-- Thin divider line between words -->
  <line x1="100" y1="53" x2="308" y2="53"
        stroke="#4338ca" stroke-width="0.7" opacity="0.6"/>

  <!-- Tagline -->
  <text x="101" y="85"
        font-family="'Dancing Script', 'Segoe Script', cursive"
        font-size="11"
        fill="#818cf8"
        opacity="0.8"
        letter-spacing="0.5">Where Every Moment Connects</text>

</svg>
