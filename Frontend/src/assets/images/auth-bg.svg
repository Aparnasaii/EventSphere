<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1080" viewBox="0 0 900 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#011142"/>
      <stop offset="35%"  stop-color="#011C6B"/>
      <stop offset="70%"  stop-color="#01258F"/>
      <stop offset="100%" stop-color="#3778C2"/>
    </linearGradient>
    <radialGradient id="g1" cx="80%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#01258F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#011142" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="10%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#3778C2" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#011142" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="55%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#4B9FE1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#011142" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="1080" fill="url(#bg)"/>
  <rect width="900" height="1080" fill="url(#g1)"/>
  <rect width="900" height="1080" fill="url(#g2)"/>
  <rect width="900" height="1080" fill="url(#g3)"/>

  <!-- Wave ellipses -->
  <ellipse cx="1050" cy="200"  rx="680" ry="500" fill="rgba(1,37,143,0.2)"  transform="rotate(-18 1050 200)"/>
  <ellipse cx="-100" cy="850"  rx="580" ry="440" fill="rgba(55,120,194,0.15)" transform="rotate(12 -100 850)"/>
  <ellipse cx="500"  cy="500"  rx="420" ry="320" fill="rgba(75,159,225,0.09)" transform="rotate(-8 500 500)"/>
  <ellipse cx="820"  cy="700"  rx="350" ry="260" fill="rgba(1,28,107,0.25)"  transform="rotate(25 820 700)"/>
  <ellipse cx="120"  cy="320"  rx="300" ry="220" fill="rgba(55,120,194,0.12)" transform="rotate(-30 120 320)"/>

  <!-- Sphere top-right -->
  <circle cx="750" cy="150" r="90" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none"/>
  <ellipse cx="750" cy="150" rx="38" ry="90" stroke="rgba(255,255,255,0.1)" stroke-width="1.2" fill="none"/>
  <path d="M660 150 Q750 162 840 150" stroke="rgba(255,255,255,0.15)" stroke-width="1.2" fill="none"/>

  <!-- Sphere bottom-left -->
  <circle cx="130" cy="920" r="65" stroke="rgba(255,255,255,0.12)" stroke-width="1.2" fill="none"/>
  <ellipse cx="130" cy="920" rx="27" ry="65" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>

  <!-- Floating dots -->
  <circle cx="180" cy="140"  r="3"   fill="rgba(255,255,255,0.38)"/>
  <circle cx="340" cy="90"   r="2"   fill="rgba(255,255,255,0.25)"/>
  <circle cx="620" cy="200"  r="4"   fill="rgba(75,159,225,0.55)"/>
  <circle cx="820" cy="380"  r="2.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="70"  cy="450"  r="3"   fill="rgba(55,120,194,0.55)"/>
  <circle cx="500" cy="820"  r="4"   fill="rgba(75,159,225,0.45)"/>
  <circle cx="760" cy="950"  r="2"   fill="rgba(255,255,255,0.3)"/>
  <circle cx="280" cy="700"  r="3"   fill="rgba(1,37,143,0.55)"/>
  <circle cx="850" cy="600"  r="2"   fill="rgba(255,255,255,0.25)"/>
  <circle cx="420" cy="1000" r="3"   fill="rgba(55,120,194,0.45)"/>

  <line x1="0" y1="400" x2="900" y2="380" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="650" x2="900" y2="670" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
</svg>
