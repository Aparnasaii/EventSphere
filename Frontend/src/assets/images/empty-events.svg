<svg xmlns="http://www.w3.org/2000/svg" width="320" height="220" viewBox="0 0 320 220">
  <!-- Outer sphere / magnifier -->
  <circle cx="130" cy="105" r="72" fill="rgba(1,28,107,0.06)" stroke="#C8D4F5" stroke-width="2"/>
  <circle cx="130" cy="105" r="55" fill="rgba(1,28,107,0.04)" stroke="#C8D4F5" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M58 105 Q130 118 202 105" stroke="#B8C8EC" stroke-width="1" fill="none"/>
  <ellipse cx="130" cy="105" rx="26" ry="72" stroke="#B8C8EC" stroke-width="1" fill="none"/>

  <!-- Calendar icon -->
  <rect x="104" y="82" width="52" height="46" rx="7" fill="#F2F5FF" stroke="#C8D4F5" stroke-width="1.5"/>
  <rect x="104" y="82" width="52" height="14" rx="7" fill="#011C6B"/>
  <rect x="104" y="89" width="52" height="7" fill="#011C6B"/>
  <!-- Grid dots -->
  <circle cx="116" cy="108" r="2.5" fill="#011C6B" opacity="0.3"/>
  <circle cx="130" cy="108" r="2.5" fill="#011C6B" opacity="0.3"/>
  <circle cx="144" cy="108" r="2.5" fill="#011C6B" opacity="0.3"/>
  <circle cx="116" cy="119" r="2.5" fill="#011C6B" opacity="0.2"/>
  <circle cx="130" cy="119" r="2.5" fill="#01258F" opacity="0.55"/>
  <circle cx="144" cy="119" r="2.5" fill="#011C6B" opacity="0.2"/>
  <!-- Calendar pins -->
  <rect x="114" y="78" width="5" height="10" rx="2.5" fill="#01258F"/>
  <rect x="141" y="78" width="5" height="10" rx="2.5" fill="#01258F"/>

  <!-- Magnifier handle -->
  <line x1="190" y1="162" x2="212" y2="184" stroke="#011C6B" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="190" y1="162" x2="212" y2="184" stroke="#3778C2" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

  <!-- Sparkle dots -->
  <circle cx="48"  cy="52"  r="3" fill="#3778C2" opacity="0.38"/>
  <circle cx="220" cy="42"  r="2" fill="#4B9FE1" opacity="0.42"/>
  <circle cx="240" cy="88"  r="3" fill="#011C6B" opacity="0.28"/>
  <circle cx="32"  cy="148" r="2" fill="#3778C2" opacity="0.32"/>
  <circle cx="210" cy="155" r="3" fill="#4B9FE1" opacity="0.38"/>

  <text x="160" y="198" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#011C6B" text-anchor="middle" opacity="0.78">No Events Found</text>
  <text x="160" y="214" font-family="Arial,sans-serif" font-size="11" fill="#5472B3" text-anchor="middle">Try adjusting your filters</text>
