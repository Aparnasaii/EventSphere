  <line x1="390" y1="100" x2="490" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <line x1="390" y1="100" x2="490" y2="60" stroke="rgba(75,159,225,0.8)" stroke-width="3" stroke-linecap="round"/>
