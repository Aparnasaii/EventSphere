  <circle cx="335" cy="215" r="12" fill="rgba(1,28,107,0.88)"  stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="280" cy="220" r="11" fill="rgba(75,159,225,0.65)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

