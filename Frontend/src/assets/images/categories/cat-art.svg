  <circle cx="545" cy="275" r="3"   fill="rgba(55,120,194,0.5)"/>

  <text x="300" y="52" font-family="Georgia,serif" font-size="22" font-weight="800" fill="rgba(255,255,255,0.92)" text-anchor="middle" letter-spacing="2">ART</text>
  <line x1="240" y1="62" x2="360" y2="62" stroke="rgba(75,159,225,0.55)" stroke-width="1.5"/>
