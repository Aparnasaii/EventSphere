      <stop offset="0%"   stop-color="#011142"/>
      <stop offset="50%"  stop-color="#011C6B"/>
      <stop offset="100%" stop-color="#3778C2"/>
    </linearGradient>
    <radialGradient id="ag2" cx="60%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#01258F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#011142" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#ag)"/>
  <rect width="600" height="340" fill="url(#ag2)"/>

  <ellipse cx="510" cy="60"  rx="300" ry="180" fill="rgba(1,37,143,0.25)"  transform="rotate(-13 510 60)"/>
  <ellipse cx="90"  cy="280" rx="260" ry="150" fill="rgba(55,120,194,0.18)" transform="rotate(8 90 280)"/>

